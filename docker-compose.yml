services:

  # ── Backend API (Node + Express + WebSocket) ───────────────
  backend:
    build:
      context: ./backend
    image: trialanderror-backend
    container_name: trialanderror-backend
    ports:
      - "4000:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FRONTEND_URL=http://localhost:3000
      - PORT=4000
    restart: unless-stopped

  # ── Frontend (nginx static + proxy) ───────────────────────
  frontend:
    image: nginx:alpine
    container_name: trialanderror-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: trialanderror-net
    driver: bridge
